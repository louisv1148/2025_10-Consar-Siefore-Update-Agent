
name: Approve Latest Data

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: 'Type "yes" to confirm release'
        required: true
        default: 'yes'

jobs:
  approve-release:
    runs-on: ubuntu-latest
    if: github.event.inputs.confirm == 'yes'

    env:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      BANXICO_TOKEN: ${{ secrets.BANXICO_TOKEN }}

    steps:
      - name: Checkout Agent Repo
        uses: actions/checkout@v3
        with:
          persist-credentials: false

      - name: Checkout History Repo
        uses: actions/checkout@v3
        with:
          repository: louisv1148/consar-siefore-history
          path: consar-siefore-history
          token: ${{ secrets.PAT_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .

      - name: Run Approval & Integration
        run: |
          export MASTER_DB_PATH=$(pwd)/consar-siefore-history/consar_siefores_with_usd.json
          python -m consar.approval.integrate

      - name: Create GitHub Release
        env:
          GITHUB_TOKEN: ${{ secrets.PAT_TOKEN }}
        run: |
          export MASTER_DB_PATH=$(pwd)/consar-siefore-history/consar_siefores_with_usd.json
          python -m consar.approval.release

      - name: Commit and Push (History Repo)
        run: |
          cd consar-siefore-history
          git config --global user.name "Consar Bot"
          git config --global user.email "bot@consar-agent.com"

          git add consar_siefores_with_usd.json
          # Commit only if changes exist, otherwise exit 0 gracefully
          git diff --quiet && git diff --staged --quiet || git commit -m "feat: Integrate approved Siefore data"

          # Push using PAT
          git push https://${{ secrets.PAT_TOKEN }}@github.com/louisv1148/consar-siefore-history.git HEAD:main

      - name: Commit and Push (Agent Repo)
        run: |
          git config --global user.name "Consar Bot"
          git config --global user.email "bot@consar-agent.com"

          # Update the approval file status
          git add approval_pending.json
          git diff --staged --quiet || git commit -m "chore: Mark data as approved"

          # Push using PAT directly (same pattern as history repo)
          BRANCH="${{ github.ref_name }}"
          git pull --rebase https://${{ secrets.PAT_TOKEN }}@github.com/louisv1148/consar-siefore-agent.git "$BRANCH"
          git push https://${{ secrets.PAT_TOKEN }}@github.com/louisv1148/consar-siefore-agent.git "HEAD:$BRANCH"

      - name: Generate Reports
        run: |
          export MASTER_DB_PATH=$(pwd)/consar-siefore-history/consar_siefores_with_usd.json
          python -m consar.reports.generate

      - name: Send Report Email
        if: always() && hashFiles('output/*.pdf') != ''
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          username: ${{ secrets.SENDER_EMAIL }}
          password: ${{ secrets.SENDER_PASSWORD }}
          subject: Afore Investment Analysis Reports (Automated)
          body: |
            Attached are the latest Afore Investment Analysis reports.

            Generated automatically from updated CONSAR data.
          to: ${{ secrets.RECIPIENT_EMAILS }}
          from: Afore Analysis Bot <${{ secrets.SENDER_EMAIL }}>
          secure: true
          attachments: output/*.pdf

      - name: Upload Report Artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: afore-reports
          path: output/
