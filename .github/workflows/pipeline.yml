
name: Run Consar Pipeline

on:
  schedule:
    # Run at 8:00 AM UTC on the 15th, 16th, and 20th of every month
    - cron: '0 8 15,16,20 * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-siefores:
    runs-on: ubuntu-latest

    env:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      BANXICO_TOKEN: ${{ secrets.BANXICO_TOKEN }}

    steps:
      - name: Checkout Agent Repo
        uses: actions/checkout@v3
        with:
          persist-credentials: false

      - name: Checkout History Repo
        uses: actions/checkout@v3
        with:
          repository: louisv1148/consar-siefore-history
          path: consar-siefore-history
          token: ${{ secrets.PAT_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .

      - name: Install Chrome
        uses: browser-actions/setup-chrome@v1
        with:
          chrome-version: stable

      - name: Run Pipeline
        run: |
          export MASTER_DB_PATH=$(pwd)/consar-siefore-history/consar_siefores_with_usd.json
          echo "Using Master DB at: $MASTER_DB_PATH"
          python -m consar.pipeline.run

      - name: Post Summary to GitHub Actions
        if: always()
        run: |
          export MASTER_DB_PATH=$(pwd)/consar-siefore-history/consar_siefores_with_usd.json
          python -m consar.pipeline.summarize >> $GITHUB_STEP_SUMMARY

      - name: Commit and Push if Changed (Agent Repo)
        run: |
          git config --global user.name "Consar Bot"
          git config --global user.email "bot@consar-agent.com"

          # Stage pipeline output files
          git add latest_run_metadata.json consar_latest_month.json consar_latest_month_enriched.json approval_pending.json consistency_report.json || true

          # Commit locally (must happen before rebase since pipeline output creates unstaged changes)
          git diff --staged --quiet || git commit -m "chore: Update metadata and latest month data"

          # Push using PAT directly (checkout action's credential helper overrides remote set-url)
          BRANCH="${{ github.ref_name }}"
          git pull --rebase https://${{ secrets.PAT_TOKEN }}@github.com/louisv1148/consar-siefore-agent.git "$BRANCH"
          git push https://${{ secrets.PAT_TOKEN }}@github.com/louisv1148/consar-siefore-agent.git "HEAD:$BRANCH"
